<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proximus Card - Local Test</title>
    
    <!-- UI5 Bootstrap -->
    <script
        id="sap-ui-bootstrap"
        src="https://openui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-language="en"
        data-sap-ui-libs="sap.ui.core,sap.m,sap.ui.integration"
        data-sap-ui-preload="async"
        data-sap-ui-bindingSyntax="complex"
        data-sap-ui-resourceroots='{"proximus": "./cards/proximus/"}'>
    </script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
        }
        
        .card-host {
            width: 100%;
            min-height: 300px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Proximus Card - Local Test</h1>
        <div id="card-container" class="card-host"></div>
    </div>
    
    <script>
        sap.ui.getCore().attachInit(function () {
            var oCard = new sap.ui.integration.widgets.Card({
                manifest: "./cards/proximus/manifest.json"
            });
            oCard.placeAt("card-container");
        });
    </script>
</body>
</html>
